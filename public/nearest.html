<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LED Plane Tracker — Nearest Flight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;color:#ccc}
.nav{width:100%;background:#050505;border-bottom:1px solid #222;padding:8px 20px;display:flex;justify-content:space-between;align-items:center}
.nav a{color:#f0c040;text-decoration:none;font-size:14px;padding:4px 12px;border:1px solid #333;border-radius:3px;transition:all .2s}
.nav a:hover,.nav a.active{background:#f0c040;color:#111}
.nav .nav-links{display:flex;gap:8px}
.nav .brand{color:#f0c040;font-size:16px;letter-spacing:2px}
body.fullscreen .nav,body.fullscreen .controls{display:none!important}
body.fullscreen .board-frame{margin:0;border:0;border-radius:0;width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:50}
body.fullscreen canvas{width:100vw;height:100vh;object-fit:contain}
body.fullscreen .fs-exit{display:block!important;position:fixed;top:10px;right:10px;z-index:200;background:#111;color:#f0c040;border:1px solid #f0c040;padding:6px 14px;font-family:inherit;font-size:14px;cursor:pointer;border-radius:3px;opacity:0.7;transition:opacity .2s}
body.fullscreen .fs-exit:hover{opacity:1;background:#f0c040;color:#111}
.fs-exit{display:none}
.controls{width:100%;padding:10px 20px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
.controls select,.controls button{background:#1a1a1a;color:#f0c040;border:1px solid #333;padding:5px 12px;font-family:inherit;font-size:13px;cursor:pointer;border-radius:3px}
.controls button:hover{background:#f0c040;color:#111}
.controls label{color:#555;font-size:12px;display:flex;align-items:center;gap:4px}
.controls input[type=checkbox]{accent-color:#f0c040}
.loc-info{color:#444;font-size:11px}
.board-frame{background:#000;border:6px solid #1a1a1a;border-radius:6px;box-shadow:0 0 40px rgba(0,0,0,.8);margin:8px 16px;position:relative;overflow:hidden;width:calc(100% - 32px)}
canvas{display:block;width:100%;height:auto}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.95);z-index:10;gap:12px}
.overlay.hidden{display:none}
.overlay h2{color:#f0c040;font-size:24px;letter-spacing:3px}
.overlay p{color:#666;font-size:14px}
.overlay .btn-row{display:flex;gap:12px;margin-top:8px}
.overlay button{background:#111;color:#f0c040;border:2px solid #f0c040;padding:12px 24px;font-family:inherit;font-size:15px;cursor:pointer;border-radius:4px;letter-spacing:1px;transition:all .2s}
.overlay button:hover{background:#f0c040;color:#111}
.spinner{width:36px;height:36px;border:3px solid #222;border-top-color:#f0c040;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<button class="fs-exit" id="fs-exit" onclick="toggleFullscreen()">✕ EXIT</button>
<div class="nav">
  <span class="brand">✈ LED PLANE TRACKER</span>
  <div class="nav-links">
    <a href="/nearest.html" class="active">NEAREST</a>
    <a href="/track.html">TRACK FLIGHT</a>
    <a href="#" onclick="toggleFullscreen();return false">FULL SCREEN</a>
  </div>
</div>
<div class="controls">
  <select id="radius"><option value="10">10 mi</option><option value="25" selected>25 mi</option><option value="50">50 mi</option><option value="100">100 mi</option><option value="250">250 mi</option></select>
  <label><input type="checkbox" id="airliners" checked> Prefer Airliners</label>
  <button onclick="doRefresh()">REFRESH</button>
  <span class="loc-info" id="loc-info"></span>
</div>
<div class="board-frame">
  <canvas id="board"></canvas>
  <div class="overlay" id="overlay-location">
    <h2>✈ LED PLANE TRACKER</h2>
    <p>Choose location to scan nearby aircraft</p>
    <div class="btn-row">
      <button onclick="useMyLocation()">📍 MY LOCATION</button>
      <button onclick="useESB()">🏙 EMPIRE STATE BLDG</button>
    </div>
  </div>
  <div class="overlay hidden" id="overlay-loading"><div class="spinner"></div><h2>SCANNING...</h2></div>
  <div class="overlay hidden" id="overlay-error"><h2>NO SIGNAL</h2><p id="error-msg" style="color:#ff4444"></p><button onclick="doRefresh()">RETRY</button></div>
</div>
<script>
// ═══ 5x7 BITMAP FONT ═══
const FONT={
' ':[0,0,0,0,0,0,0],'!':[4,4,4,4,4,0,4],'"':[10,10,0,0,0,0,0],'#':[10,31,10,10,31,10,0],'$':[4,15,20,14,5,30,4],'%':[24,25,2,4,8,19,3],'&':[12,18,12,13,18,13,0],"'":[4,4,0,0,0,0,0],'(':[2,4,8,8,8,4,2],')':[8,4,2,2,2,4,8],'*':[0,4,21,14,21,4,0],'+':[0,4,4,31,4,4,0],',':[0,0,0,0,0,4,8],'-':[0,0,0,31,0,0,0],'.':[0,0,0,0,0,0,4],'/':[1,1,2,4,8,16,16],
'0':[14,17,19,21,25,17,14],'1':[4,12,4,4,4,4,14],'2':[14,17,1,2,4,8,31],'3':[14,17,1,6,1,17,14],'4':[2,6,10,18,31,2,2],'5':[31,16,30,1,1,17,14],'6':[6,8,16,30,17,17,14],'7':[31,1,2,4,8,8,8],'8':[14,17,17,14,17,17,14],'9':[14,17,17,15,1,2,12],
':':[0,0,4,0,4,0,0],';':[0,0,4,0,4,4,8],'<':[1,2,4,8,4,2,1],'=':[0,0,31,0,31,0,0],'>':[16,8,4,2,4,8,16],'?':[14,17,1,2,4,0,4],'@':[14,17,23,21,23,16,14],
'A':[14,17,17,31,17,17,17],'B':[30,17,17,30,17,17,30],'C':[14,17,16,16,16,17,14],'D':[30,17,17,17,17,17,30],'E':[31,16,16,30,16,16,31],'F':[31,16,16,30,16,16,16],'G':[14,17,16,23,17,17,15],'H':[17,17,17,31,17,17,17],'I':[14,4,4,4,4,4,14],'J':[7,2,2,2,2,18,12],'K':[17,18,20,24,20,18,17],'L':[16,16,16,16,16,16,31],'M':[17,27,21,21,17,17,17],'N':[17,17,25,21,19,17,17],'O':[14,17,17,17,17,17,14],'P':[30,17,17,30,16,16,16],'Q':[14,17,17,17,21,18,13],'R':[30,17,17,30,20,18,17],'S':[14,17,16,14,1,17,14],'T':[31,4,4,4,4,4,4],'U':[17,17,17,17,17,17,14],'V':[17,17,17,17,10,10,4],'W':[17,17,17,21,21,27,17],'X':[17,17,10,4,10,17,17],'Y':[17,17,10,4,4,4,4],'Z':[31,1,2,4,8,16,31],
};

// ═══ HIGH-RES DOT MATRIX ═══
const COLS = 260;
const ROWS = 110;
const DOT_SP = 4;
const DOT_R = 1.4;

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
canvas.width = COLS * DOT_SP;
canvas.height = ROWS * DOT_SP;

const C = {white:'#e0e0ff',amber:'#f0c040',red:'#ff3333',dim:'#1a1a1a'};
let grid = [];

function clearGrid(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++)grid[r][c]=null}}

function render(){
  ctx.fillStyle='#050505';ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<ROWS;r++){for(let c=0;c<COLS;c++){
    const x=c*DOT_SP+DOT_SP/2,y=r*DOT_SP+DOT_SP/2,col=grid[r][c];
    ctx.beginPath();ctx.arc(x,y,DOT_R,0,Math.PI*2);
    if(col){ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=3;ctx.fill();ctx.shadowBlur=0}
    else{ctx.fillStyle='#0c0c0c';ctx.fill()}
  }}
}

function drawText(text,col,row,color,scale){
  scale=scale||1;let cx=col;const upper=text.toUpperCase();
  for(let i=0;i<text.length;i++){
    const ch=text[i];const glyph=FONT[ch]||FONT[upper[i]]||FONT['?'];
    if(!glyph){cx+=6*scale;continue}
    for(let gy=0;gy<7;gy++){const rb=glyph[gy];for(let gx=0;gx<5;gx++){if(rb&(16>>gx)){
      for(let sy=0;sy<scale;sy++){for(let sx=0;sx<scale;sx++){
        const gr=row+gy*scale+sy,gc=cx+gx*scale+sx;
        if(gr>=0&&gr<ROWS&&gc>=0&&gc<COLS)grid[gr][gc]=color;
      }}
    }}}
    cx+=6*scale;
  }
}

// Draw logo with ORIGINAL colors from PNG
function drawLogo(img,col,row,dotW,dotH){
  const tc=document.createElement('canvas'),tx=tc.getContext('2d');
  tc.width=dotW;tc.height=dotH;tx.drawImage(img,0,0,dotW,dotH);
  const id=tx.getImageData(0,0,dotW,dotH),px=id.data;
  for(let dy=0;dy<dotH;dy++){for(let dx=0;dx<dotW;dx++){
    const i=(dy*dotW+dx)*4;
    const r=px[i],g=px[i+1],b=px[i+2],a=px[i+3];
    const brightness=(r+g+b)/3;
    if(brightness>30&&a>60){
      // Use the actual pixel color
      const hex='#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      const gr=row+dy,gc=col+dx;
      if(gr>=0&&gr<ROWS&&gc>=0&&gc<COLS)grid[gr][gc]=hex;
    }
  }}
}

function drawLine(row,color){for(let c=0;c<COLS;c+=2)if(row>=0&&row<ROWS)grid[row][c]=color||C.dim}

// ═══ DATA ═══
const AIRCRAFT_DB={"A19N":"A319neo","A20N":"A320neo","A21N":"A321neo","A318":"A318","A319":"A319","A320":"A320","A321":"A321","A332":"A330-200","A333":"A330-300","A339":"A330-900","A343":"A340-300","A359":"A350-900","A35K":"A350-1000","A388":"A380","AT76":"ATR 72","B37M":"737 MAX 7","B38M":"737 MAX 8","B39M":"737 MAX 9","B3XM":"737 MAX 10","B712":"717","B737":"737-700","B738":"737-800","B739":"737-900","B744":"747-400","B748":"747-8","B752":"757-200","B753":"757-300","B763":"767-300","B764":"767-400","B772":"777-200","B773":"777-300","B77L":"777-200LR","B77W":"777-300ER","B788":"787-8","B789":"787-9","B78X":"787-10","BCS1":"A220-100","BCS3":"A220-300","CRJ2":"CRJ 200","CRJ7":"CRJ 700","CRJ9":"CRJ 900","CRJX":"CRJ 1000","DH8D":"Dash 8","E170":"E170","E175":"E175","E190":"E190","E195":"E195","E75L":"E175","E75S":"E175","GLF6":"G650","GLEX":"Global Exp","MD11":"MD-11","MD82":"MD-82","C68A":"Citation Lat"};
const AIRLINES={"AAL":"American","ACA":"Air Canada","AFR":"Air France","AIC":"Air India","ANA":"ANA","ANZ":"Air NZ","ASA":"Alaska","BAW":"British Airways","CCA":"Air China","CPA":"Cathay","CSN":"China Sthn","DAL":"Delta","DLH":"Lufthansa","EDV":"Endeavor","EIN":"Aer Lingus","ENY":"Envoy","ETD":"Etihad","ETH":"Ethiopian","EVA":"EVA Air","FDX":"FedEx","GJS":"GoJet","HAL":"Hawaiian","IBE":"Iberia","ICE":"Icelandair","JAL":"JAL","JBU":"JetBlue","JIA":"PSA Airlines","KAL":"Korean Air","KLM":"KLM","LAN":"LATAM","NKS":"Spirit","PAL":"Philippine","PDT":"Piedmont","QFA":"Qantas","QTR":"Qatar","RPA":"Republic","RYR":"Ryanair","SAS":"SAS","SIA":"Singapore","SKW":"SkyWest","SWA":"Southwest","SWR":"Swiss","TAP":"TAP","THA":"Thai","THY":"Turkish","UAE":"Emirates","UAL":"United","UPS":"UPS","VIR":"Virgin Atl","WJA":"WestJet"};

const ESB={lat:40.748817,lon:-73.985428};
let userLat=null,userLon=null,locLabel='',refreshTimer=null;

function airlineName(cs){if(!cs||cs.length<3)return cs||'???';return AIRLINES[cs.substring(0,3).toUpperCase()]||cs}
function acModel(t){return AIRCRAFT_DB[t]||t||'???'}
function fmtAltNum(a){if(!a||a==='ground')return a==='ground'?'GND':'---';const k=a/1000;return k>=10?Math.round(k)+'K':k.toFixed(1)+'K'}
function fmtSpdNum(s){if(!s)return'---';return ''+Math.round(parseFloat(s))}
function fmtVr(v){if(!v||v==0)return'0fpm';const r=Math.round(v);return(r>0?'+':'')+r+'fpm'}
function compass(d){if(d==null)return'';return["N","NE","E","SE","S","SW","W","NW"][Math.round((d%360)/45)%8]}
function haversine(lat1,lon1,lat2,lon2){const R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

function showOv(id){document.querySelectorAll('.overlay').forEach(e=>e.classList.add('hidden'));if(id)document.getElementById(id).classList.remove('hidden')}
function useMyLocation(){showOv('overlay-loading');if(!navigator.geolocation){useESB();return}navigator.geolocation.getCurrentPosition(p=>{userLat=p.coords.latitude;userLon=p.coords.longitude;locLabel='Your Location';go()},()=>{userLat=ESB.lat;userLon=ESB.lon;locLabel='Empire State Bldg';go()},{timeout:10000})}
function useESB(){userLat=ESB.lat;userLon=ESB.lon;locLabel='Empire State Bldg';showOv('overlay-loading');go()}
function go(){document.getElementById('loc-info').textContent=`${locLabel} (${userLat.toFixed(3)}, ${userLon.toFixed(3)})`;fetchNearest();if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(fetchNearest,12000)}
function doRefresh(){if(userLat)fetchNearest();else showOv('overlay-location')}

async function fetchNearest(){
  const radius=document.getElementById('radius').value;
  try{
    const r=await fetch(`/api/aircraft?lat=${userLat}&lon=${userLon}&radius=${radius}`);
    if(!r.ok)throw new Error('API '+r.status);
    const data=await r.json();
    let ac=(data.ac||[]).filter(a=>a.lat&&a.lon);
    ac.sort((a,b)=>(parseFloat(a.dst||999999))-(parseFloat(b.dst||999999)));
    if(ac.length===0){showOv('overlay-error');document.getElementById('error-msg').textContent='No aircraft found';return}
    const pref=document.getElementById('airliners').checked;
    let sel=0;
    if(pref){const idx=ac.findIndex(a=>['A3','A4','A5'].includes(a.category||''));if(idx>=0)sel=idx}
    const flight=(ac[sel].flight||'').trim();
    let routeStr='', flightProgress=0;
    try{
      const rr=await fetch('/api/routeset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({planes:[{callsign:flight,lat:ac[sel].lat,lng:ac[sel].lon}]})});
      if(rr.ok){
        const rd=await rr.json();
        if(rd&&rd.length>0){
          const entry=rd[0];
          // Get IATA codes for route display
          let codes=entry._airport_codes_iata||[];
          if(!Array.isArray(codes)){codes=String(codes||'').split(',').map(s=>s.trim()).filter(Boolean)}
          if(codes.length===0){let ac2=entry.airport_codes||[];if(!Array.isArray(ac2))ac2=String(ac2||'').split(',').map(s=>s.trim()).filter(Boolean);codes=ac2}
          if(codes.length>=2)routeStr=codes[0]+' - '+codes[codes.length-1];
          else if(codes.length===1)routeStr=codes[0];
          // Calculate progress from _airports lat/lon
          const airports=entry._airports||[];
          if(airports.length>=2){
            const oLat=parseFloat(airports[0].lat),oLon=parseFloat(airports[0].lon);
            const dLat=parseFloat(airports[airports.length-1].lat),dLon=parseFloat(airports[airports.length-1].lon);
            const totalDist=haversine(oLat,oLon,dLat,dLon);
            const toDest=haversine(parseFloat(ac[sel].lat),parseFloat(ac[sel].lon),dLat,dLon);
            if(totalDist>0)flightProgress=Math.max(0,Math.min(1,(totalDist-toDest)/totalDist));
          }
        }
      }
    }catch(e){console.log('Route error:',e)}
    renderBoard(ac[sel],routeStr,flightProgress);
    showOv(null);
  }catch(e){showOv('overlay-error');document.getElementById('error-msg').textContent=e.message}
}

function renderBoard(ac, routeStr, progress) {
  clearGrid();
  const cs = (ac.flight || '???').trim();
  const name = airlineName(cs);
  const route = routeStr || '';
  const typ = acModel(ac.t || '');
  const altNum = fmtAltNum(ac.alt_baro);
  const spdNum = fmtSpdNum(ac.gs);
  const trk = ac.track != null ? Math.round(ac.track) + 'deg ' + compass(ac.track) : '---';
  const vr = fmtVr(parseInt(ac.baro_rate || 0));
  const reg = ac.r || '---';
  const sqwk = ac.squawk || '---';
  const dist = ac.dst != null ? parseFloat(ac.dst).toFixed(1) + 'mi ' + compass(ac.dir) : '';
  const lat = ac.lat ? parseFloat(ac.lat).toFixed(4) : '?';
  const lon = ac.lon ? parseFloat(ac.lon).toFixed(4) : '?';

  // Logo: 36x36 dots with REAL colors
  const logoCode = cs.length >= 3 ? cs.substring(0, 3).toUpperCase() : '';
  const logoImg = new Image();
  logoImg.crossOrigin = 'anonymous';
  logoImg.onload = function() { drawLogo(logoImg, 2, 2, 36, 36); render(); };
  logoImg.onerror = function() { render(); };
  logoImg.src = `/logos/${logoCode}.png`;

  const tl = 42; // text left after logo

  // Row 0: Airline name (scale 2 = 14 dots tall)
  drawText(name, tl, 2, C.white, 2);

  // Row 1: Callsign (scale 1, dimmer)
  drawText(cs, tl, 18, '#888888', 1);

  // Row 2: Route (scale 2, amber)
  drawText(route, tl, 28, C.amber, 2);

  // Separator
  drawLine(44, C.dim);

  // Row 3: Aircraft type (scale 1)
  drawText('Aircraft: ' + typ, 2, 47, C.white, 1);

  // Row 4: Registration + Squawk
  drawText('Reg: ' + reg + '   Squawk: ' + sqwk, 2, 57, '#888888', 1);

  // Separator
  drawLine(66, C.dim);

  // Row 5: Altitude + Speed — numbers scale 2, units scale 1
  const altLabel = 'ALT ' + altNum;
  drawText(altLabel, 2, 69, C.white, 2);
  drawText('FT', 2 + altLabel.length * 12 + 2, 76, '#888888', 1);

  const spdLabel = 'SPD ' + spdNum;
  drawText(spdLabel, 140, 69, C.white, 2);
  drawText('KTS', 140 + spdLabel.length * 12 + 2, 76, '#888888', 1);

  // Row 6: Track + VR (scale 1)
  drawText('TRK ' + trk, 2, 85, C.amber, 1);
  drawText('VR ' + vr, 150, 85, C.amber, 1);

  // Row 7: Distance + Coords
  drawText('Dist: ' + dist + '   Pos: ' + lat + ',' + lon, 2, 93, '#666666', 1);

  // ═══ GREEN PROGRESS BAR (only if route data exists) ═══
  if (route) {
    const barY = ROWS - 4;
    const pct = progress || 0;
    const filledCols = Math.round(pct * (COLS - 4));
    for (let r = barY; r < barY + 3; r++) {
      for (let c = 2; c < COLS - 2; c++) {
        if (r >= 0 && r < ROWS) grid[r][c] = '#0a1a0a';
      }
    }
    for (let r = barY; r < barY + 3; r++) {
      for (let c = 2; c < 2 + filledCols; c++) {
        if (r >= 0 && r < ROWS && c < COLS - 2) grid[r][c] = '#00ff44';
      }
    }
  }

  render();
}

document.getElementById('radius').addEventListener('change',()=>{if(userLat)fetchNearest()});
document.getElementById('airliners').addEventListener('change',()=>{if(userLat)fetchNearest()});

function toggleFullscreen(){
  const b=document.body;
  if(b.classList.contains('fullscreen')){b.classList.remove('fullscreen');if(document.exitFullscreen)document.exitFullscreen().catch(()=>{})}
  else{b.classList.add('fullscreen');if(document.documentElement.requestFullscreen)document.documentElement.requestFullscreen().catch(()=>{})}
}
document.addEventListener('fullscreenchange',()=>{if(!document.fullscreenElement)document.body.classList.remove('fullscreen')});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&document.body.classList.contains('fullscreen'))document.body.classList.remove('fullscreen')});
</script>
</body>
</html>
